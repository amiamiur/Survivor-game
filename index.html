<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выживание на арене</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="arena_style.css"> 
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Шапка с ресурсами (будет видна всегда) -->
        <header class="game-header">
            <div class="resources">
                <div class="resource-item" id="proviziya">🍞  <span>0</span></div>
                <div class="resource-item" id="toplivo">⛽  <span>0</span></div>
                <div class="resource-item" id="instrumenty">🔧  <span>0</span></div>
            </div>
            <div class="header-right">
                <span id="currentHeroName">Герой: Не выбран</span>
            </div>
        </header>

        <!-- Основное рабочее поле (экраны) -->
        <main class="game-screen" id="gameScreen">
            <!-- Экран 1: Главное меню (Локации) -->
            <div class="screen active" id="screenLobby">
                <h2>Выбор локации</h2>
                <div class="locations-grid">
                    <div class="location-card" data-location="forest">
                        <h3>Лес</h3>
                        <p>Стоимость: 🍞 1 провизия</p>
                        <button class="start-match-btn" data-cost-type="proviziya">Начать</button>
                    </div>
                    <div class="location-card" data-location="desert">
                        <h3>Пустыня</h3>
                        <p>Стоимость: ⛽ 1 топливо</p>
                        <button class="start-match-btn" data-cost-type="toplivo">Начать</button>
                    </div>
                    <div class="location-card" data-location="factory">
                        <h3>Завод</h3>
                        <p>Стоимость: 🔧 1 инструменты</p>
                        <button class="start-match-btn" data-cost-type="instrumenty">Начать</button>
                    </div>
                </div>
            </div>

            <!-- Экран 2: Герои -->
            <div class="screen" id="screenHeroes">
                <h2>Герои</h2>
                <div class="heroes-list" id="heroesList">
                    <!-- Сюда будут динамически добавляться герои -->
                </div>
            </div>

            <!-- Экран 3: Магазин -->
            <div class="screen" id="screenShop">
                <h2>Магазин</h2>
                <div class="shop-grid" id="shopItems">
                    <!-- Товары магазина -->
                </div>
            </div>

            <!-- Экран 4: Крафт -->
            <div class="screen" id="screenCraft">
                <h2>Крафт</h2>
                <div class="craft-grid" id="craftRecipes">
                    <!-- Рецепты крафта -->
                </div>
            </div>

            <!-- Экран 5: Арена (Survivors-style) -->
            <div class="screen" id="screenArena">
                <div class="arena-game-container">
                    <!-- Верхняя панель с информацией -->
                    <div class="arena-header">
                        <div class="arena-stats">
                            <div class="stat">❤️ <span id="arenaHp">100</span>/<span id="arenaMaxHp">100</span></div>
                            <div class="stat">⚔️ <span id="arenaAttack">15</span></div>
                            <div class="stat">⏱️ <span id="arenaTimer">0:00</span></div>
                            <div class="stat">🎯 Ур. <span id="arenaLevel">1</span></div>
                        </div>
                        <button class="pause-btn" id="pauseBtn">⏸️</button>
                    </div>

                    <!-- Canvas для игры -->
                    <canvas id="gameCanvas" width="800" height="600"></canvas>

                    <!-- Джойстик для мобильных устройств -->
                    <div class="joystick-container" id="joystickContainer">
                        <div class="joystick-base">
                            <div class="joystick-thumb" id="joystickThumb"></div>
                        </div>
                    </div>

                    <!-- Пауза/меню выхода -->
                    <div class="pause-menu" id="pauseMenu" style="display: none;">
                        <h3>Пауза</h3>
                        <button class="resume-btn" id="resumeBtn">Продолжить</button>
                        <button class="exit-arena-btn" id="exitArenaBtn">Выйти с арены</button>
                    </div>
                </div>
            </div>

        </main>

        <!-- Нижняя навигация -->
        <nav class="game-nav">
            <button class="nav-btn active" data-screen="lobby">🏠 Локации</button>
            <button class="nav-btn" data-screen="heroes">⚔️ Герои</button>
            <button class="nav-btn" data-screen="shop">🛒 Магазин</button>
            <button class="nav-btn" data-screen="craft">🔨 Крафт</button>
        </nav>
    </div>

    <!-- Модальное окно (для инвентаря/экипировки позже) -->
    <div class="modal" id="heroModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Core классы -->
    <script src="js/core/GameState.js"></script>
    <script src="js/core/Item.js"></script>
    <script src="js/core/Hero.js"></script> 
    <script src="js/core/Shop.js"></script>
    <script src="js/core/Recipe.js"></script>

    <!-- Классы арены (НОВЫЕ) -->
    <script src="js/arena/GameEntity.js"></script>
    <script src="js/arena/SpriteManager.js"></script> 
    <script src="js/arena/SurvivorsArena.js"></script> 
    <script src="js/arena/ArenaController.js"></script>

    <!-- UI -->
    <script src="js/ui/UIManager.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
